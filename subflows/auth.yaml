# subflows/auth.yaml
appId: com.smobilpayagentapp
---
- launchApp:
    clearState: true
- tapOn:
    id: "GetStartedButton"
- tapOn:
    id: "InitialLoginFormUsername"
- inputText: ${username}
- hideKeyboard
- tapOn:
    id: "InitialLoginFormPassword"
- inputText: ${password}
- hideKeyboard
# Tapping the left side of the Login button at the bottom (90% height)
- tapOn:
    point: "20%, 70%"
