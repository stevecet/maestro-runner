# subflows/auth.yaml
appId: com.smobilpayagentapp
---
- launchApp:
    clearState: true
- tapOn:
    id: "GetStartedButton"
- tapOn:
    id: "InitialLoginFormUsername"
- inputText: ${username}
- back
- tapOn:
    id: "InitialLoginFormPassword"
- inputText: ${password}
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "InitialLoginFormButtonLogin"
    timeout: 10000
- tapOn:
    id: "InitialLoginFormButtonLogin"
