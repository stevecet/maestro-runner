# subflows/search_service.yaml
# Parameters:
#   searchValue: The text to search for
#   serviceId: The ID of the service item to select (e.g., "ServiceItem-MTN Recharge/Topup")
appId: com.smobilpayagentapp
---
- tapOn: "View all services"
- tapOn:
    id: "search-bar"
- inputText: ${searchValue}
- back
- tapOn:
    id: "${serviceId}"
