# subflows/confirm_transaction.yaml
# Handles the confirmation of a transaction and waits for success result.
appId: com.smobilpayagentapp
---
- extendedWaitUntil:
    visible: "Transaction Details"
    timeout: ${GLOBAL_TIMEOUT}
- scroll
- tapOn:
    id: "CollectionPreviewConfirmButton"
- extendedWaitUntil:
    visible: "Collection Details"
    timeout: ${GLOBAL_TIMEOUT}
- extendedWaitUntil:
    visible: "Success"
    timeout: 60000
