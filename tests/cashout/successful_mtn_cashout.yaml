## Verify as a Smobilpay Agent, I can do a cashout via MTN successfully
appId: com.smobilpayagentapp
onFlowStart:
  - runFlow: ../../subflows/restart_app.yaml
---
- runScript: ../../data/cashout_data.js
- tapOn: "View all services"
- tapOn:
    id: "search-bar"
- inputText: ${output.cashout_data.searchMTNCashout}
- back
- tapOn: "ServiceItem-MTN MoMo Cash Out / RETRAIT"
- tapOn: 
    id: "AmountFormServiceNumber"
- inputText: ${output.cashout_data.mtnServiceNumber}
- tapOn:
    id: "AmountFormAmount"
- inputText: ${output.cashout_data.cashoutAmount}
- back
- tapOn:
    id: "AmountFormSubmit"
- extendedWaitUntil:
    visible: ${output.cashout_data.transactionDetails}
    timeout: 10000
- scroll
## assert if the amount and the total are equal
- assertVisible:
    text: "${output.cashout_data.displayedAmount} XAF"
- assertVisible:
    text: "${output.cashout_data.serviceCharge} XAF"
- assertVisible:
    text: "${output.cashout_data.mtnTotalAmount} XAF"
- tapOn:
    id: "CollectionPreviewConfirmButton"
## assert successful transaction
- extendedWaitUntil:
    visible: "Collection Details"
    timeout: 20000
- extendedWaitUntil:
    visible: "Success"
    timeout: 30000