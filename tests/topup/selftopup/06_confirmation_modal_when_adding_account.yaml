# Verify I see a confirmation modal when adding an account
appId: com.smobilpayagentapp
onFlowStart:
  - runFlow: ../../../subflows/restart_app.yaml
---
- tapOn: "Fund your account"
- extendedWaitUntil:
    visible: "Enter amount"
    timeout: 10000
# TODO: replace with the actual selector/text for the action that adds an account/number.
- tapOn: "Add account"
- extendedWaitUntil:
    visible: "Confirm"
    timeout: 10000
- assertVisible: "Confirm"
- assertVisible: "Cancel"

