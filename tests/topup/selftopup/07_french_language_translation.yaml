# Verify I can see the French version of the app if I translate it.
# This assumes the app provides an in-app language switch. If language is controlled by device locale,
# set the emulator locale in the container instead.
appId: com.smobilpayagentapp
onFlowStart:
  - runFlow: ../../../subflows/restart_app.yaml
---
# TODO: navigate to Settings -> Language and select French.
- tapOn:
    id: "AppMenuItem-Settings"
- tapOn: "Language"
- tapOn: "Français"
# Validate a known UI string in French.
- extendedWaitUntil:
    visible: "Services favoris"
    timeout: 60000
- assertVisible: "Services favoris"

