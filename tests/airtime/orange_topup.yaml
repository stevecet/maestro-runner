## Verify as a Smobilpay Agent, I can do topup via ORANGE Recharge successfully
appId: com.smobilpayagentapp
onFlowStart:
  - runFlow: ../../subflows/restart_app.yaml
---
- runScript: ../../data/airtime_data.js
- runFlow:
    file: ../../subflows/search_service.yaml
    env:
      searchValue: ${output.topup_data.searchValueOrange}
      serviceId: "ServiceItem-ORANGE Recharge/Topup"
- runFlow:
    file: ../../subflows/fill_transaction_form.yaml
    env:
      serviceNumber: ${output.topup_data.orangeServiceNumber}
      amount: ${output.topup_data.topupAmount}

## verify transaction details before confirming
- extendedWaitUntil:
    visible: "Transaction Details"
    timeout: 10000
- scroll
- assertVisible: "Customer ID"
- assertVisible: "${output.topup_data.orangeServiceNumber}"
- assertVisible: "${output.topup_data.amountText}"
- assertVisible: "${output.topup_data.displayedAmount} XAF"
- assertVisible: "${output.topup_data.serviceFeeText}"
- assertVisible: "${output.topup_data.orangeServiceCharge} XAF"
- assertVisible: "${output.topup_data.totalText}"
- assertVisible: "${output.topup_data.totalAmount} XAF"
- tapOn:
    id: "CollectionPreviewConfirmButton"
## assert successful transaction
- extendedWaitUntil:
    visible: "Collection Details"
    timeout: 20000
- assertVisible: "${output.topup_data.orangeServiceNumber}"
- assertVisible: "${output.topup_data.displayedAmount} XAF"
- extendedWaitUntil:
    visible: "Success"
    timeout: 30000
