## Verify as a Smobilpay Agent, I can do a cashin via Orange successfully
appId: com.smobilpayagentapp
onFlowStart:
  - runFlow: ../../subflows/restart_app.yaml
---
- runScript: ../../data/cashin_data.js
- runFlow:
    file: ../../subflows/search_service.yaml
    env:
      searchValue: ${output.cashin_data.searchOrangeCashin}
      serviceId: "ServiceItem-Orange Money Cash in / DEPOT"
- runFlow:
    file: ../../subflows/fill_transaction_form.yaml
    env:
      serviceNumber: ${output.cashin_data.orangeServiceNumber}
      amount: ${output.cashin_data.cashinAmount}

- extendedWaitUntil:
    visible: ${output.cashin_data.transactionDetails}
    timeout: 10000
- scroll

## assert if the amount and the total are equal
- assertVisible:
    text: "${output.cashin_data.displayedAmount} XAF"
    index: 0
- assertVisible:
    text: "${output.cashin_data.displayedAmount} XAF"
    index: 1

## confirm and verify success
- runFlow: ../../subflows/confirm_transaction.yaml

## extra verification on success screen
- assertVisible: "Collection Details"
- assertVisible: "${output.cashin_data.orangeServiceNumber}"
- assertVisible: "${output.cashin_data.displayedAmount} XAF"
